<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaQR - Offline QR Code Generator</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="card">
    <header>
      <h1 class="logo">🦊 MetaQR</h1>
      <p class="subtitle">Online and real-time QR generation</p>
    </header>

    <main>
      <!-- Row 1: Inputs (Text and Size) -->
      <div class="config-row">
        <div class="field-group">
          <label for="inputText">URL or Text</label>
          <input type="text" id="inputText" value="https://metamask.io" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="qrSize">Size (px)</label>
          <input type="number" id="qrSize" min="100" max="1000" value="250" step="50">
        </div>
      </div>

      <!-- Row 2: QR preview and Download Actions -->
      <div class="bottom-section">
        <div class="qr-preview-box">
          <div class="qr-image-container">
            <img id="qrImg" alt="QR Code" src="">
          </div>
        </div>

        <div class="download-panel">
          <div class="select-wrapper">
            <select id="downloadFormat">
              <option value="png">PNG Image</option>
              <option value="pdf">PDF Document</option>
            </select>
          </div>
          <button id="downloadBtn" class="download-btn">Download QR Code</button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
